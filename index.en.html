<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALCAMPETTO 🏀 — Free basketball courts atlas · Milan</title>

  <!-- EXTERNAL DEPENDENCY: Google Fonts
       Loads three font families from Google's CDN.
       Without an internet connection the browser uses system fonts. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Shared stylesheet -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">

  <!-- EXTERNAL DEPENDENCY: Leaflet
       Interactive map library. OpenStreetMap tiles. -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       LIGHTBOX
       Fullscreen overlay: hero + Mondrian mosaic + autore.
       Content built dynamically by alcampetto.js.
       ═══════════════════════════════════════════════════════ -->
  <div id="lightbox">
    <button id="lightbox-close">✕</button>
  </div>


  <!-- ═══════════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════════ -->
  <header class="site-header">
    <div class="header-left">
      <a class="logo" href="index.en.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="38 46 375 120">
          <line x1="145.03" y1="101.5" x2="403.69" y2="101.5" stroke="#FF5F1F" stroke-width="3.3" opacity="0.25" stroke-linecap="round"/>
          <text x="50" y="130" font-family="'Bebas Neue', sans-serif" font-size="80" letter-spacing="3.2px" fill="#FF5F1F"><tspan>AL</tspan><tspan fill="none" stroke="none">C</tspan><tspan fill="#E8E8E8">AMPETTO</tspan></text>
          <path d="M 145.03,76.75 A 24.75,24.75 0 1,0 145.03,126.25" fill="none" stroke="#FF5F1F" stroke-width="5.5" stroke-linecap="round"/>
          <circle cx="145.03" cy="101.50" r="3.3" fill="#FF5F1F"/>
        </svg>
      </a>
      <div class="tagline">
        Open dataset · MIT Licence<br>
        Free basketball courts · Milan
      </div>
    </div>
    <div class="lang-switch">
      <button class="provider-btn active" data-provider="google">Google Maps</button>
      <button class="provider-btn" data-provider="osm">OSM</button>
      <a class="lang-btn" href="index.html"><span class="flag">🇮🇹</span> IT</a>
    </div>
  </header>


  <!-- ═══════════════════════════════════════════════════════
       CONTROLS BAR
       ═══════════════════════════════════════════════════════ -->
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="search" id="search" placeholder="Search by name, area, address…" autofocus>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="lit">Lit</button>
      <button class="filter-btn" data-filter="three_pt_line">Three-pt line</button>
      <button class="filter-btn" data-filter="fenced">Fenced</button>
    </div>
    <div class="sort-group">
      <span class="sort-label">Sort</span>
      <button class="sort-btn active" data-sort="id">By #ID</button>
      <button class="sort-btn" data-sort="date">Most recent</button>
    </div>
    <div class="count-label">Results: <strong id="count">—</strong></div>
  </div>


  <!-- ═══════════════════════════════════════════════════════
       VIEW TABS
       Switch between card grid and map view.
       ═══════════════════════════════════════════════════════ -->
  <div class="view-tabs">
    <button class="view-tab active" data-view="grid">Grid</button>
    <button class="view-tab" data-view="map">Map</button>
  </div>


  <!-- ═══════════════════════════════════════════════════════
       MAP
       Leaflet container, hidden by default.
       Activated by the "Map" tab.
       ═══════════════════════════════════════════════════════ -->
  <div id="map"></div>


  <!-- ═══════════════════════════════════════════════════════
       COURT GRID
       Cards are generated by alcampetto.js after
       alcampetto.json is loaded.
       ═══════════════════════════════════════════════════════ -->
  <main id="grid">
    <div class="state-msg">Loading data…</div>
  </main>


  <!-- ═══════════════════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════════════════ -->
  <footer class="site-footer">
    <div class="footer-meta">
      Licenses: <a href="https://opensource.org/licenses/MIT" target="_blank" rel="noopener">MIT</a> for code, <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a> for data, <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener">CC BY-NC-ND 4.0</a> for photos and audio files.<br>
      Contribute on <a href="https://github.com/photogabe/alcampetto" target="_blank" rel="noopener">GitHub</a> ·
      <a href="about.en.html">About</a>
    </div>
    <a class="json-btn" href="alcampetto.json" target="_blank" download>
      ⬇ Download alcampetto.json
    </a>
  </footer>


  <!-- EXTERNAL DEPENDENCY: Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>

  <!-- Shared JavaScript — included after the DOM so it can
       find all HTML elements it needs to manage. -->
  <script src="alcampetto.js"></script>

</body>
</html>
