<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALCAMPETTO 🏀 — Open Dataset</title>

  <!-- EXTERNAL DEPENDENCY: Google Fonts
       Loads three font families from Google's CDN.
       Without an internet connection the browser uses system fonts. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Shared stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       LIGHTBOX
       Full-screen photo viewer.
       Managed by alcampetto.js.
       ═══════════════════════════════════════════════════════ -->
  <div id="lightbox">
    <button id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="">
  </div>


  <!-- ═══════════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════════ -->
  <header>
    <div class="header-left">
      <a class="logo" href="index.en.html">AL<span>CAMPETTO</span> 🏀</a>
      <div class="tagline">
        Open dataset · MIT Licence<br>
        Free basketball courts · Milan &amp; surroundings
      </div>
    </div>
    <div class="lang-switch">
      <a class="lang-btn" href="about.en.html">About</a>
      <a class="lang-btn" href="index.html"><span class="flag">🇮🇹</span> IT</a>
    </div>
  </header>


  <!-- ═══════════════════════════════════════════════════════
       CONTROLS BAR
       ═══════════════════════════════════════════════════════ -->
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search by name, area, address…">
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="illuminato">Lit</button>
      <button class="filter-btn" data-filter="coperto">Indoors</button>
      <button class="filter-btn" data-filter="recintato">Fenced</button>
    </div>
    <div class="sort-group">
      <span class="sort-label">Sort</span>
      <button class="sort-btn active" data-sort="id">By #ID</button>
      <button class="sort-btn" data-sort="date">Most recent</button>
    </div>
    <div class="count-label">Results: <strong id="count">—</strong></div>
  </div>


  <!-- ═══════════════════════════════════════════════════════
       COURT GRID
       Cards are generated by alcampetto.js after
       alcampetto.json is loaded.
       ═══════════════════════════════════════════════════════ -->
  <main id="grid">
    <div class="state-msg">Loading data…</div>
  </main>


  <!-- ═══════════════════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════════════════ -->
  <footer>
    <div class="footer-meta">
      Dataset released under <a href="https://opensource.org/licenses/MIT" target="_blank">MIT</a> ·
      Contribute on <a href="https://github.com/" target="_blank">GitHub</a> ·<br>
      Data verified on the ground · ALCAMPETTO project
    </div>
    <a class="json-btn" href="alcampetto.json" target="_blank" download>
      ⬇ Download alcampetto.json
    </a>
  </footer>


  <!-- Shared JavaScript — included after the DOM so it can
       find all HTML elements it needs to manage. -->
  <script src="alcampetto.js"></script>

</body>
</html>
