<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALCAMPETTO 🏀 — Atlante dei campetti a Milano</title>

  <!-- DIPENDENZA ESTERNA: Google Fonts
       Carica tre famiglie tipografiche dal CDN di Google.
       Senza connessione internet il browser usa i font di sistema. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Foglio di stile condiviso -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">

  <!-- DIPENDENZA ESTERNA: Leaflet
       Libreria per mappe interattive. Tile OpenStreetMap. -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       LIGHTBOX
       Overlay fullscreen: hero + mosaico Mondrian + autore.
       Il contenuto è costruito dinamicamente da alcampetto.js.
       ═══════════════════════════════════════════════════════ -->
  <div id="lightbox">
    <button id="lightbox-close">✕</button>
  </div>


  <!-- ═══════════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════════ -->
  <header class="site-header">
    <div class="header-left">
      <a class="logo" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="38 46 375 120">
          <line x1="145.03" y1="101.5" x2="403.69" y2="101.5" stroke="#FF5F1F" stroke-width="3.3" opacity="0.25" stroke-linecap="round"/>
          <text x="50" y="130" font-family="'Bebas Neue', sans-serif" font-size="80" letter-spacing="3.2px" fill="#FF5F1F"><tspan>AL</tspan><tspan fill="none" stroke="none">C</tspan><tspan fill="#E8E8E8">AMPETTO</tspan></text>
          <path d="M 145.03,76.75 A 24.75,24.75 0 1,0 145.03,126.25" fill="none" stroke="#FF5F1F" stroke-width="5.5" stroke-linecap="round"/>
          <circle cx="145.03" cy="101.50" r="3.3" fill="#FF5F1F"/>
        </svg>
      </a>
      <div class="tagline">
        Dataset aperto · Licenza MIT<br>
        Atlante dei campetti di basket · Milano
      </div>
    </div>
    <div class="lang-switch">
      <button class="provider-btn active" data-provider="google">Google Maps</button>
      <button class="provider-btn" data-provider="osm">OSM</button>
      <a class="lang-btn" href="index.en.html"><span class="flag">🇬🇧</span> EN</a>
    </div>
  </header>


  <!-- ═══════════════════════════════════════════════════════
       BARRA CONTROLLI
       ═══════════════════════════════════════════════════════ -->
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="search" id="search" placeholder="Cerca per nome, zona, indirizzo…" autofocus>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">Tutti</button>
      <button class="filter-btn" data-filter="lit">Illuminati</button>
      <button class="filter-btn" data-filter="three_pt_line">Linea da 3</button>
      <button class="filter-btn" data-filter="fenced">Recintati</button>
    </div>
    <div class="sort-group">
      <span class="sort-label">Ordina</span>
      <button class="sort-btn active" data-sort="id">Per #ID</button>
      <button class="sort-btn" data-sort="date">Più recenti</button>
    </div>
    <div class="count-label">Risultati: <strong id="count">—</strong></div>
  </div>


  <!-- ═══════════════════════════════════════════════════════
       TAB VISTA
       Permette di alternare tra griglia card e vista mappa.
       ═══════════════════════════════════════════════════════ -->
  <div class="view-tabs">
    <button class="view-tab active" data-view="grid">Griglia</button>
    <button class="view-tab" data-view="map">Mappa</button>
  </div>


  <!-- ═══════════════════════════════════════════════════════
       MAPPA
       Contenitore Leaflet, nascosto per default.
       Attivato dal tab "Mappa".
       ═══════════════════════════════════════════════════════ -->
  <div id="map"></div>


  <!-- ═══════════════════════════════════════════════════════
       GRIGLIA CAMPETTI
       Le card vengono generate da alcampetto.js dopo il
       caricamento di alcampetto.json.
       ═══════════════════════════════════════════════════════ -->
  <main id="grid">
    <div class="state-msg">Caricamento dati…</div>
  </main>


  <!-- ═══════════════════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════════════════ -->
  <footer class="site-footer">
    <div class="footer-meta">
      Dataset rilasciato con licenza <a href="https://opensource.org/licenses/MIT" target="_blank">MIT</a> ·
      Contribuisci su <a href="https://github.com/photogabe/alcampetto" target="_blank">GitHub</a> ·
      <a href="about.html">About</a><br>
      Dati verificati sul campo · Progetto ALCAMPETTO
    </div>
    <a class="json-btn" href="alcampetto.json" target="_blank" download>
      ⬇ Scarica alcampetto.json
    </a>
  </footer>


  <!-- DIPENDENZA ESTERNA: Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>

  <!-- JavaScript condiviso — deve essere incluso dopo il DOM,
       prima della chiusura di </body>, così trova tutti gli
       elementi HTML che deve gestire (lightbox, griglia, ecc.) -->
  <script src="alcampetto.js"></script>

</body>
</html>
